<script>
var copyIcon = '<svg viewBox="0 0 24 24"><rect x="8" y="8" width="14" height="14" rx="1.5"/><rect x="2" y="2" width="14" height="14" rx="1.5"/></svg>';
var checkIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
document.querySelectorAll('.install-option').forEach(function(el) {
  var pre = el.querySelector('pre');
  if (!pre) return;
  var btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = copyIcon;
  btn.title = 'Copy to clipboard';
  btn.addEventListener('click', function() {
    navigator.clipboard.writeText(pre.textContent).then(function() {
      btn.innerHTML = checkIcon;
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = copyIcon;
        btn.classList.remove('copied');
      }, 1500);
    });
  });
  el.appendChild(btn);
});
</script>
